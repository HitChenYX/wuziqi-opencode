<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五子棋 - 对战香猪1号</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="game-container">
        <header class="game-header">
            <h1 class="game-title">五子棋</h1>
            <p class="game-subtitle">对战香猪1号</p>
        </header>

        <main class="game-main">
            <div class="board-container">
                <canvas id="game-board" width="600" height="600"></canvas>
                <div class="board-shadow"></div>
            </div>

            <div class="game-info">
                <div class="status-panel">
                    <div class="status-item">
                        <span class="status-label">当前状态:</span>
                        <span id="game-status" class="status-value">黑棋回合</span>
                    </div>
                    <div class="status-item">
                        <span class="status-label">对局时长:</span>
                        <span id="game-time" class="status-value">00:00</span>
                    </div>
                </div>

                <div class="player-info">
                    <div class="player-card player-black">
                        <div class="player-stone"></div>
                        <span class="player-name">玩家 (黑棋)</span>
                        <span class="player-score" id="black-score">0</span>
                    </div>
                    <div class="vs-divider">VS</div>
                    <div class="player-card player-white">
                        <div class="player-stone"></div>
                        <span class="player-name">香猪1号 (白棋)</span>
                        <span class="player-score" id="white-score">0</span>
                    </div>
                </div>

                <div class="game-controls">
                    <button id="restart-btn" class="btn btn-primary">
                        <span class="btn-icon">↺</span>
                        <span class="btn-text">重新开始</span>
                    </button>
                    <button id="undo-btn" class="btn btn-secondary">
                        <span class="btn-icon">↩</span>
                        <span class="btn-text">悔棋</span>
                    </button>
                </div>
            </div>
        </main>

        <footer class="game-footer">
            <p>© 2024 五子棋对战平台 · 传承经典 乐在棋中</p>
        </footer>
    </div>

    <script src="game.js"></script>
</body>
</html>
